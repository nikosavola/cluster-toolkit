# CodeQL Advanced
#
# Performs static analysis (SAST) of the codebase using GitHub CodeQL.
#
# Public documentation: https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/customizing-your-advanced-setup-for-code-scanning
---
name: 'CodeQL'

# yamllint disable-line rule:truthy
on:
  pull_request:
    branches:
    - main
    - develop
  schedule:
    - cron: '30 4 * * 1'

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  analyze:
    name: 'Analyze (${{ matrix.language }})'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
        - language: go
          build-mode: manual
        - language: python
          build-mode: none
    steps:
    - name: 'Checkout repository'
      uses: actions/checkout@v6
    - name: 'Set up Go'
      if: matrix.language == 'go'
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        check-latest: true
    - name: 'Initialize CodeQL'
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
    - name: 'Build Go'
      if: matrix.language == 'go'
      run: go build ./...
    - name: 'Perform CodeQL Analysis'
      uses: github/codeql-action/analyze@v3
      with:
        category: '/language:${{ matrix.language }}'
