---
name: 'Run Go unit tests with race detector'

# yamllint disable-line rule:truthy
on:
  pull_request:
    types:
    - opened
    - reopened
    - synchronize
    branches:
    - main
    - develop
    - release-candidate
    - hotfix-*

permissions:
  contents: read

jobs:
  test-race:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        check-latest: true
    - run: make test-race
